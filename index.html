<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Vinyl Player</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="player-shell">
    <section class="player-card" aria-labelledby="page-title">
      <header class="player-header">
        <p class="eyebrow">1960s–1970s Collection</p>
        <h1 id="page-title">Random Vinyl Player</h1>
      </header>

      <div class="video-wrap">
        <div id="youtube-player"></div>
      </div>

      <section class="track-info" aria-live="polite">
        <p id="status" class="status">Loading tracks…</p>
        <h2 id="track-title">No track selected</h2>
        <p id="track-details">Artist and album will appear here.</p>
      </section>

      <div class="controls" aria-label="Music controls">
        <button id="previous-button" type="button" disabled>
          Previous
        </button>

        <button id="play-button" class="primary" type="button" disabled>
          Play
        </button>

        <button id="next-button" type="button" disabled>
          Random Next
        </button>
      </div>

      <div class="secondary-controls">
        <label for="volume-control">Volume</label>
        <input
          id="volume-control"
          type="range"
          min="0"
          max="100"
          value="70"
          disabled
        >
      </div>
    </section>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
